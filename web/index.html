<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>mangas-binder</title>
<style>
  :root { --bg:#0f1115; --panel:#181b22; --panel2:#20242e; --fg:#e6e9ef; --muted:#8b93a7; --acc:#6d8bff; --ok:#3fb950; --warn:#d29922; --err:#f85149; --line:#2a2f3a; }
  * { box-sizing: border-box; }
  body { margin:0; font:14px/1.5 system-ui,sans-serif; background:var(--bg); color:var(--fg); }
  header { display:flex; align-items:center; gap:16px; padding:12px 20px; background:var(--panel); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:10; }
  header h1 { font-size:16px; margin:0; letter-spacing:.5px; }
  header h1 span { color:var(--acc); }
  nav { display:flex; gap:4px; margin-left:auto; }
  nav button { background:none; border:none; color:var(--muted); padding:8px 14px; border-radius:8px; cursor:pointer; font-size:14px; }
  nav button.active, nav button:hover { background:var(--panel2); color:var(--fg); }
  main { max-width:1000px; margin:0 auto; padding:20px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:16px; margin-bottom:14px; }
  .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  input, select, button.btn { background:var(--panel2); color:var(--fg); border:1px solid var(--line); border-radius:8px; padding:8px 10px; font-size:14px; }
  button.btn { cursor:pointer; }
  button.btn.primary { background:var(--acc); border-color:var(--acc); color:#fff; }
  button.btn.sm { padding:4px 8px; font-size:12px; }
  h2 { font-size:14px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin:0 0 12px; }
  .muted { color:var(--muted); }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:12px; }
  .pill { display:inline-block; padding:1px 8px; border-radius:999px; font-size:11px; background:var(--panel2); color:var(--muted); }
  .pill.ok{color:var(--ok)} .pill.warn{color:var(--warn)} .pill.err{color:var(--err)} .pill.acc{color:var(--acc)}
  table { width:100%; border-collapse:collapse; }
  th,td { text-align:left; padding:6px 8px; border-bottom:1px solid var(--line); font-size:13px; }
  th { color:var(--muted); font-weight:500; }
  .title-row { display:flex; justify-content:space-between; gap:8px; align-items:flex-start; }
  .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--panel2); border:1px solid var(--line); padding:10px 16px; border-radius:10px; opacity:0; transition:.2s; }
  .toast.show { opacity:1; }
  a { color:var(--acc); }
  label.field { display:flex; flex-direction:column; gap:4px; font-size:12px; color:var(--muted); }
</style>
</head>
<body>
<header>
  <h1>mangas<span>-binder</span></h1>
  <nav id="nav"></nav>
</header>
<main id="view"></main>
<div class="toast" id="toast"></div>
<script type="module" src="/app.js"></script>
</body>
</html>
